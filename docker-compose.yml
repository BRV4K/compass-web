services:
  postgres:
    image: postgres:16-alpine
    container_name: compass_web_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: compass_web
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d compass_web']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compass_web_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/compass_web
      JWT_SECRET: compass-web-demo-secret
    ports:
      - '8080:3001'

volumes:
  postgres_data:
