services:
  postgres:
    image: postgres:16-alpine
    container_name: compass_web_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compass_web}
      POSTGRES_USER: ${POSTGRES_USER:-compass_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-compass_user} -d ${POSTGRES_DB:-compass_web}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compass_web_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://compass_user:change-me@postgres:5432/compass_web}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
    ports:
      - '127.0.0.1:8080:3001'

volumes:
  postgres_data:
